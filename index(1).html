<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BAIDABOYS27 CHUG WHEEL</title>
<style>
  :root{--bg:#05050b;--hot:#ff1744;--cyan:#00f5ff;--gold:#ffd23f;--white:#fff;}
  *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 20%,#24204a 0,#090912 45%,#020205 100%);color:#fff;font-family:Impact,Arial Black,system-ui,sans-serif;overflow:hidden;touch-action:manipulation;}
  body.flash{animation:flash .14s infinite} @keyframes flash{0%{background:#ff0033}50%{background:#fff;color:#111}100%{background:#05050b}}
  .brand{position:fixed;right:14px;top:10px;font-size:13px;letter-spacing:2px;color:#fff;opacity:.9;text-shadow:0 0 12px var(--cyan);z-index:5}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 12px 20px;gap:8px;}
  h1{margin:0;font-size:clamp(54px,18vw,160px);letter-spacing:4px;line-height:.86;text-shadow:0 0 12px #000,0 0 30px var(--hot),7px 7px 0 #000;transform:skew(-5deg)}
  .sub{font-family:Arial Black,system-ui,sans-serif;font-size:clamp(13px,3.2vw,21px);letter-spacing:2px;color:#ffec99;text-align:center;text-shadow:0 0 12px #000;margin-bottom:2px}
  .game{position:relative;width:min(92vw,540px);height:min(92vw,540px);display:grid;place-items:center;filter:drop-shadow(0 0 24px rgba(0,245,255,.35));}
  canvas{width:100%;height:100%;border-radius:50%;}
  .hub{position:absolute;width:24%;height:24%;border-radius:50%;background:radial-gradient(circle,#fff,#ffd23f 52%,#ff5a00);border:5px solid #111;display:grid;place-items:center;font-size:clamp(18px,5vw,38px);text-shadow:2px 2px 0 #000;box-shadow:0 0 20px #ff0;z-index:2}
  .pointer{position:absolute;left:50%;transform:translateX(-50%);width:0;height:0;border-left:25px solid transparent;border-right:25px solid transparent;z-index:4;filter:drop-shadow(0 0 10px #000)}
  .pointer.top{top:-4px;border-top:0;border-bottom:58px solid #fff;}
  .pointer.bottom{bottom:-4px;border-bottom:0;border-top:58px solid #00f5ff;}
  .plabel{position:absolute;left:50%;transform:translateX(-50%);font-family:Arial Black,system-ui,sans-serif;font-size:12px;letter-spacing:2px;z-index:5;color:#111;background:#fff;border-radius:999px;padding:2px 8px}.ltop{top:50px}.lbottom{bottom:50px;background:#00f5ff;color:#001}
  .btn{margin-top:8px;border:0;border-radius:999px;padding:17px 32px;font-family:Arial Black,system-ui,sans-serif;font-size:clamp(20px,5vw,34px);letter-spacing:2px;background:linear-gradient(135deg,#00f5ff,#ffd23f,#ff1744);color:#05050b;box-shadow:0 0 24px rgba(255,255,255,.35);cursor:pointer;animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .count{height:34px;font-family:Arial Black,system-ui,sans-serif;font-size:clamp(18px,5vw,30px);color:#ffd23f;text-shadow:0 0 14px #000}
  .result{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;z-index:10;padding:20px}.result.show{display:flex;animation:boom .4s ease-out}@keyframes boom{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
  .result .title{font-size:clamp(58px,18vw,170px);line-height:.82;text-shadow:0 0 20px #ff0033,8px 8px #000;animation:shake .12s infinite}.names{font-size:clamp(30px,9vw,82px);line-height:1.04;color:#ffd23f;text-shadow:0 0 18px #000,4px 4px #ff0033;margin-top:18px}.again{margin-top:22px;border:3px solid #fff;background:#111;color:#fff;border-radius:999px;padding:13px 22px;font-family:Arial Black;font-size:18px}.hidden{display:none}@keyframes shake{0%{transform:translate(1px,1px) rotate(-1deg)}50%{transform:translate(-2px,1px) rotate(1deg)}100%{transform:translate(1px,-2px) rotate(0)}}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:11}.piece{position:absolute;width:10px;height:18px;background:#fff;animation:fall 1.8s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.2}}
  video{display:none}
</style>
</head>
<body>
<div class="brand">BAIDABOYS27</div>
<div class="wrap">
  <h1>CHUG!!</h1>
  <div class="sub">2 PILER • 2 NAVN • DROP PÅ 3 SEKUNDER</div>
  <div class="count" id="count">TRYKK START</div>
  <div class="game">
    <canvas id="wheel" width="900" height="900"></canvas>
    <div class="pointer top"></div><div class="plabel ltop">PIL 1</div>
    <div class="pointer bottom"></div><div class="plabel lbottom">PIL 2</div>
    <div class="hub">🍺</div>
  </div>
  <button id="start" class="btn">START CHUG</button>
</div>
<div id="result" class="result"><div class="title">CHUG!</div><div id="winnerNames" class="names"></div><button id="again" class="again">SPIN AGAIN</button></div>
<div id="confetti" class="confetti"></div>
<video id="song" preload="auto" playsinline webkit-playsinline>
  <source src="song.mp4" type="video/mp4">
  <source src="song(1).mp4" type="video/mp4">
</video>
<script>
const names=["Alexander Nikolai Pedersen","Noah Mimon Jakobsen","Luckas Kuraas Eivik","Andre Hagen Gullbransen","Marius Kvensjø","Phillip Ingvart Akselsen","Fredrik Mikkelsen","Kasper Einås Eidum","Niklas Nilsen","Gabriel Clason","Luca Matheo Edvardsen","Matheo Fakking Mulitmilardær","Bartek Molinski","Mathias Eidisen","Dennis Sandvik","Henrik Ingebritsen","Tobias Harlund","Håvard Baustad","Omar Mballow","Leon Tretvoll","Casper Barosen","Magnus Sommerseth"];
const colors=["#ff1744","#00f5ff","#ffd23f","#7c4dff","#00e676","#ff9100","#ff4fd8","#40c4ff"];
const canvas=document.getElementById('wheel'),ctx=canvas.getContext('2d');
const N=names.length, seg=Math.PI*2/N; let rotation=-Math.PI/2-seg/2; let spinning=false;
const topAngle=-Math.PI/2, bottomAngle=Math.PI/2; // peker nøyaktig på topp og bunn av hjulet
function mod(a){return ((a%(Math.PI*2))+Math.PI*2)%(Math.PI*2)}
function indexAt(pointerAngle){return Math.floor(mod(pointerAngle-rotation)/seg)%N}
function draw(){const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2,r=w*.47;ctx.clearRect(0,0,w,h);ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);for(let i=0;i<N;i++){ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,i*seg,(i+1)*seg);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();ctx.strokeStyle="#090909";ctx.lineWidth=4;ctx.stroke();ctx.save();ctx.rotate(i*seg+seg/2);ctx.textAlign="right";ctx.fillStyle="#fff";ctx.font="900 23px Arial";ctx.shadowColor="#000";ctx.shadowBlur=8;let parts=names[i].split(' ');let label=parts[0]+(parts[1]?" "+parts[1][0]+".":"");ctx.fillText(label,r-18,8);ctx.restore();}ctx.restore();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.lineWidth=10;ctx.strokeStyle="#fff";ctx.stroke();}
draw();
function confetti(){const box=document.getElementById('confetti');box.innerHTML='';for(let i=0;i<140;i++){const p=document.createElement('div');p.className='piece';p.style.left=Math.random()*100+'vw';p.style.top='-30px';p.style.background=colors[i%colors.length];p.style.animationDelay=Math.random()*0.4+'s';p.style.transform='rotate('+Math.random()*360+'deg)';box.appendChild(p);}setTimeout(()=>box.innerHTML='',2300)}
function showResult(){let a=indexAt(topAngle), b=indexAt(bottomAngle); if(a===b) b=(b+Math.floor(N/2))%N; document.getElementById('winnerNames').innerHTML=names[a].toUpperCase()+"<br>&<br>"+names[b].toUpperCase(); document.getElementById('result').classList.add('show'); document.body.classList.add('flash'); confetti(); if(navigator.vibrate) navigator.vibrate([180,80,180,80,420]);}
function start(){if(spinning)return;spinning=true;document.getElementById('result').classList.remove('show');document.body.classList.remove('flash');const song=document.getElementById('song');try{song.currentTime=0;song.play().catch(()=>{});}catch(e){} const duration=3000, startTime=performance.now(), startRot=rotation; const extra=Math.PI*2*(5+Math.random()*2); const targetOffset=Math.random()*Math.PI*2; const endRot=startRot+extra+targetOffset; function frame(t){let p=Math.min(1,(t-startTime)/duration);let ease=1-Math.pow(1-p,3);rotation=startRot+(endRot-startRot)*ease;draw();let left=Math.max(0,Math.ceil((duration-(t-startTime))/1000));document.getElementById('count').textContent=left>0?left:'CHUG NÅ!'; if(p<1)requestAnimationFrame(frame);else{rotation=endRot;draw();spinning=false;showResult();}}requestAnimationFrame(frame)}
document.getElementById('start').addEventListener('click',start);document.getElementById('again').addEventListener('click',start);
</script>
</body>
</html>
