<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BAIDABOYS27 CHUG WHEEL v4</title>
<style>
:root{--bg:#050510;--pink:#ff1b6b;--cyan:#00f5ff;--gold:#ffd23f;--green:#00ff7f;--white:#fff}
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 22%,#251a52 0,#090913 48%,#020205 100%);color:white;font-family:Impact,"Arial Black",system-ui,sans-serif;touch-action:manipulation;user-select:none}
body.flash{animation:flash .115s infinite}@keyframes flash{0%{background:#ff0033;color:#fff}50%{background:#fff;color:#111}100%{background:#050510;color:#fff}}
.brand{position:fixed;right:14px;top:10px;z-index:20;font-size:12px;letter-spacing:2px;color:white;text-shadow:0 0 12px var(--cyan)}
.screen{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 10px 18px;gap:8px}
h1{margin:0;font-size:clamp(54px,17vw,150px);letter-spacing:4px;line-height:.82;text-shadow:0 0 12px #000,0 0 30px var(--pink),7px 7px 0 #000;transform:skew(-5deg)}
.status{height:28px;font-family:Arial Black,system-ui,sans-serif;font-size:clamp(16px,4.5vw,28px);color:var(--gold);text-shadow:0 0 13px #000;letter-spacing:1px}
.game{position:relative;width:min(86vw,520px);height:min(86vw,520px);display:grid;place-items:center;filter:drop-shadow(0 0 22px rgba(0,245,255,.32));margin:4px 0 2px}
canvas{width:100%;height:100%;border-radius:50%}.hub{position:absolute;z-index:4;width:24%;height:24%;border-radius:50%;background:radial-gradient(circle,#fff 0,#ffd23f 50%,#ff5a00 100%);border:6px solid #080808;display:grid;place-items:center;font-size:clamp(25px,8vw,48px);box-shadow:0 0 22px #ff0;text-shadow:2px 2px 0 #000}
.arrow{position:absolute;top:50%;z-index:8;width:0;height:0;filter:drop-shadow(0 0 10px #000)}
.arrow.left{left:-6px;transform:translateY(-50%);border-top:28px solid transparent;border-bottom:28px solid transparent;border-left:0;border-right:70px solid var(--pink)}
.arrow.right{right:-6px;transform:translateY(-50%);border-top:28px solid transparent;border-bottom:28px solid transparent;border-right:0;border-left:70px solid var(--cyan)}
.badge{position:absolute;z-index:9;top:50%;font-family:Arial Black,system-ui,sans-serif;font-size:12px;letter-spacing:2px;border-radius:999px;padding:4px 9px;color:#020205;text-shadow:none}.badge.left{left:10px;transform:translateY(43px);background:var(--pink);color:white}.badge.right{right:10px;transform:translateY(43px);background:var(--cyan)}
.hint{font-family:Arial Black,system-ui,sans-serif;font-size:clamp(12px,3.2vw,18px);letter-spacing:2px;color:#ffec99;text-align:center;text-shadow:0 0 10px #000}
.btn{border:0;border-radius:999px;padding:16px 28px;font-family:Arial Black,system-ui,sans-serif;font-size:clamp(21px,5vw,35px);letter-spacing:2px;background:linear-gradient(135deg,var(--cyan),var(--gold),var(--pink));color:#050510;box-shadow:0 0 24px rgba(255,255,255,.35);cursor:pointer;animation:pulse 1.1s infinite}@keyframes pulse{50%{transform:scale(1.06)}}
.result{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;background:rgba(0,0,0,.82);padding:18px}.result.show{display:flex;animation:boom .35s ease-out}@keyframes boom{0%{transform:scale(.65);opacity:0}100%{transform:scale(1);opacity:1}}
.resultTitle{font-size:clamp(62px,19vw,175px);line-height:.82;text-shadow:0 0 18px var(--pink),8px 8px #000;animation:shake .12s infinite}.names{font-size:clamp(28px,8vw,76px);line-height:1.04;color:var(--gold);text-shadow:0 0 18px #000,4px 4px var(--pink);margin-top:18px}.again{margin-top:22px;border:3px solid #fff;background:#101010;color:white;border-radius:999px;padding:13px 24px;font-family:Arial Black;font-size:18px}@keyframes shake{0%{transform:translate(1px,1px) rotate(-1deg)}50%{transform:translate(-2px,2px) rotate(1deg)}100%{transform:translate(1px,-2px) rotate(0)}}
.confetti{position:fixed;inset:0;z-index:31;pointer-events:none}.piece{position:absolute;width:10px;height:18px;background:#fff;animation:fall 1.8s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(760deg);opacity:.15}}
video{display:none}
</style>
</head>
<body>
<div class="brand">BAIDABOYS27</div>
<div class="screen">
<h1>CHUG!!</h1>
<div id="status" class="status">TRYKK START</div>
<div class="game">
<canvas id="wheel" width="1000" height="1000"></canvas>
<div class="arrow left"></div><div class="badge left">PIL 1</div>
<div class="arrow right"></div><div class="badge right">PIL 2</div>
<div class="hub">🍺</div>
</div>
<div class="hint">TO PILER PÅ HVER SIN SIDE • STOPPER PÅ DROPPET ETTER 3 SEK</div>
<button id="start" class="btn">START CHUG</button>
</div>
<div id="result" class="result"><div class="resultTitle">CHUG!</div><div id="winnerNames" class="names"></div><button id="again" class="again">SPIN AGAIN</button></div>
<div id="confetti" class="confetti"></div>
<video id="song" preload="auto" playsinline webkit-playsinline>
  <source src="song.mp4" type="video/mp4">
  <source src="song(1).mp4" type="video/mp4">
</video>
<script>
const names=["Alexander Nikolai Pedersen","Noah Mimon Jakobsen","Luckas Kuraas Eivik","Andre Hagen Gullbransen","Marius Kvensjø","Phillip Ingvart Akselsen","Fredrik Mikkelsen","Kasper Einås Eidum","Niklas Nilsen","Gabriel Clason","Luca Matheo Edvardsen","Matheo Fakking Mulitmilardær","Bartek Molinski","Mathias Eidisen","Dennis Sandvik","Henrik Ingebritsen","Tobias Harlund","Håvard Baustad","Omar Mballow","Leon Tretvoll","Casper Barosen","Magnus Sommerseth"];
const colors=["#ff1744","#00f5ff","#ffd23f","#7c4dff","#00e676","#ff9100","#ff4fd8","#40c4ff"];
const canvas=document.getElementById('wheel'),ctx=canvas.getContext('2d'),N=names.length,TAU=Math.PI*2,seg=TAU/N;
let rotation=-seg/2,spinning=false,lastWinners=[0,Math.floor(N/2)];
// Pilene står på venstre og høyre side. Dette er de EKSAKTE vinklene de velger fra hjulet.
const LEFT_POINTER=Math.PI;   // venstre side av hjulet
const RIGHT_POINTER=0;       // høyre side av hjulet
function mod(a){return ((a%TAU)+TAU)%TAU}
function indexAt(pointerAngle,rot=rotation){return Math.floor(mod(pointerAngle-rot)/seg)%N}
function shortName(full){const p=full.split(' ');return p[0]+(p[1]?' '+p[1][0]+'.':'')}
function draw(highlight=false){const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2,r=w*.47;ctx.clearRect(0,0,w,h);ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);for(let i=0;i<N;i++){ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,i*seg,(i+1)*seg);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();ctx.strokeStyle="#070707";ctx.lineWidth=4;ctx.stroke();ctx.save();ctx.rotate(i*seg+seg/2);ctx.textAlign="right";ctx.fillStyle="#fff";ctx.font="900 24px Arial";ctx.shadowColor="#000";ctx.shadowBlur=9;ctx.fillText(shortName(names[i]),r-17,8);ctx.restore();}
if(highlight){for(const idx of lastWinners){ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r+2,idx*seg,(idx+1)*seg);ctx.closePath();ctx.fillStyle="rgba(255,255,255,.26)";ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=10;ctx.stroke();}}
ctx.restore();ctx.beginPath();ctx.arc(cx,cy,r,0,TAU);ctx.lineWidth=12;ctx.strokeStyle="#fff";ctx.stroke();}
draw();
function confetti(){const box=document.getElementById('confetti');box.innerHTML='';for(let i=0;i<150;i++){const p=document.createElement('div');p.className='piece';p.style.left=Math.random()*100+'vw';p.style.top='-30px';p.style.background=colors[i%colors.length];p.style.animationDelay=Math.random()*0.45+'s';p.style.transform='rotate('+Math.random()*360+'deg)';box.appendChild(p)}setTimeout(()=>box.innerHTML='',2300)}
function showResult(){lastWinners=[indexAt(LEFT_POINTER),indexAt(RIGHT_POINTER)];if(lastWinners[0]===lastWinners[1])lastWinners[1]=(lastWinners[1]+Math.floor(N/2))%N;draw(true);document.getElementById('winnerNames').innerHTML=names[lastWinners[0]].toUpperCase()+"<br>&<br>"+names[lastWinners[1]].toUpperCase();document.getElementById('result').classList.add('show');document.body.classList.add('flash');confetti();if(navigator.vibrate)navigator.vibrate([160,70,160,70,420]);}
function start(){if(spinning)return;spinning=true;document.getElementById('result').classList.remove('show');document.body.classList.remove('flash');
const song=document.getElementById('song');try{song.pause();song.currentTime=0;const p=song.play();if(p)p.catch(()=>{});}catch(e){}
const startRot=rotation,duration=3000,startTime=performance.now();
// Velg ett tilfeldig sluttpunkt. Begge pilene bruker samme matematikk, så navnene matcher pilene.
const chosen=Math.floor(Math.random()*N);
const randomInside=(Math.random()-.5)*seg*.55; // stopper inni navnefeltet, ikke på grensen
const finalRotRaw=LEFT_POINTER-(chosen+.5)*seg+randomInside;
let finalRot=finalRotRaw;
while(finalRot<startRot+TAU*6)finalRot+=TAU; // nok spinning
function frame(t){const p=Math.min(1,(t-startTime)/duration);const ease=1-Math.pow(1-p,4);rotation=startRot+(finalRot-startRot)*ease;draw();const left=Math.ceil((duration-(t-startTime))/1000);document.getElementById('status').textContent=left>0?left:'CHUG NÅ!';if(p<1){requestAnimationFrame(frame)}else{rotation=finalRot;spinning=false;showResult();}}
requestAnimationFrame(frame)}
document.getElementById('start').addEventListener('click',start);document.getElementById('again').addEventListener('click',start);
</script>
</body>
</html>
